<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SKYFALL</title>
    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; background: #070b18; }
      #app { position: fixed; inset: 0; }

        font-family: "Menlo", "Consolas", monospace; color: #d7dce8;

      }
    </style>

    <div id="app"></div>
    <div id="hud"></div>
